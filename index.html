<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="description" content="Brixnode — The elevated hub for digital tools, AI assets, templates, knowledge & creation. Discover premium digital products from top creators." />
    <meta name="keywords" content="digital marketplace, AI assets, templates, Notion templates, prompt packs, ebooks, presets, digital tools, creator marketplace" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Brixnode" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Brixnode — The elevated hub for digital tools & AI assets" />
    <meta property="og:description" content="Discover premium digital products, AI assets, templates, and knowledge from top creators. Secure manual payments, instant access." />
    <meta property="og:site_name" content="Brixnode" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Brixnode — Digital Tools & AI Assets Hub" />
    <meta name="twitter:description" content="The elevated hub for digital tools, AI assets, templates, knowledge & creation." />

    <link rel="canonical" href="https://brixnode.com/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- PWA iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Brixnode" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>Brixnode — The elevated hub for digital tools, AI assets, templates & knowledge</title>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Brixnode",
      "url": "https://brixnode.com/",
      "description": "The elevated hub for digital tools, AI assets, templates, knowledge & creation.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://brixnode.com/browse?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
